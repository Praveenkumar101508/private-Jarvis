# =============================================================================
# LiveKit Server Configuration
# SupraCloud IRA — Voice / WebRTC Layer
#
# Docs: https://docs.livekit.io/home/self-hosting/deployment/
# =============================================================================

port: 7880

# ── RTC / NAT traversal ───────────────────────────────────────────────────────
# Single unified rtc block (duplicate removed — YAML doesn't allow two rtc: keys)
rtc:
  tcp_port: 7881
  udp_port: 7882
  # Auto-detect external IP for NAT traversal.
  # For strict NAT environments, set use_external_ip: true
  # and configure node_ip to your server's public IP.
  use_external_ip: true
  # STUN servers — NAT traversal without TURN (covers most networks)
  stun_servers:
    - stun:stun.l.google.com:19302
    - stun:stun1.l.google.com:19302

# Keys — injected at runtime via environment variables
# LiveKit reads LIVEKIT_API_KEY and LIVEKIT_API_SECRET from env.
# The keys block below sets the default key pair via env var substitution.
keys:
  # Format: <api_key>: <api_secret>
  # These values are populated from the environment at container start.
  # Set LIVEKIT_API_KEY and LIVEKIT_API_SECRET in your .env file.
  # Fallback dev key — override with real credentials via LIVEKIT_API_KEY / LIVEKIT_API_SECRET in .env
  devkey: devsecret

# ── Room defaults ─────────────────────────────────────────────────────────────
room:
  # Disconnect participants after 10 minutes of silence
  empty_timeout: 600
  # Maximum room duration (24h) — prevents zombie sessions
  departure_timeout: 86400
  # IRA voice rooms need audio only
  max_participants: 10

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: info
  json: true        # Structured logs for log aggregators

# ── TURN server (optional) ────────────────────────────────────────────────────
# Uncomment to enable voice through strict corporate firewalls:
# turn:
#   enabled: true
#   domain: turn.your-domain.com
#   tls_port: 5349
#   udp_port: 3478
#   external_tls: true

# ── Webhook (IRA API receives LiveKit room events) ────────────────────────────
# Uncomment once the /webhooks/livekit endpoint is live in ira-api:
# webhook:
#   urls:
#     - http://ira-api:8000/webhooks/livekit
#   api_key: ${LIVEKIT_API_KEY}
