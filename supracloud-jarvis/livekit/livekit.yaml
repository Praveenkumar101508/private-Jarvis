# =============================================================================
# LiveKit Server Configuration
# SupraCloud Jarvis — Voice / WebRTC Layer
#
# Docs: https://docs.livekit.io/home/self-hosting/deployment/
# =============================================================================

port: 7880
rtc:
  tcp_port: 7881
  udp_port: 7882
  # Allow LiveKit to detect the external IP automatically.
  # For production behind NAT, set use_external_ip: true and configure
  # node_ip to your server's public IP.
  use_external_ip: true

# Keys — injected at runtime via environment variables
keys:
  # Format: api_key: api_secret
  # The actual values come from LIVEKIT_API_KEY and LIVEKIT_API_SECRET env vars.
  # LiveKit reads them from the yaml; we embed the env var references.
  # NOTE: The livekit server supports direct env var substitution here.

# Room defaults — tuned for voice assistant latency
room:
  # Disconnect participants after 10 minutes of silence (voice idle)
  empty_timeout: 600
  # Maximum room duration (24h) — prevents zombie sessions
  departure_timeout: 86400
  # Agents typically need only audio
  max_participants: 10

# Audio/video settings for voice-optimised latency
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true
  # STUN servers — used for NAT traversal without TURN
  stun_servers:
    - stun:stun.l.google.com:19302
    - stun:stun1.l.google.com:19302

# Logging
logging:
  level: info
  json: true            # Structured logs for log aggregators

# TURN server (optional, enables voice through strict firewalls)
# Uncomment and configure if clients behind corporate firewalls can't connect:
# turn:
#   enabled: true
#   domain: turn.your-domain.com
#   tls_port: 5349
#   udp_port: 3478
#   external_tls: true

# Webhook (Phase 2: Jarvis API will receive LiveKit room events)
# webhook:
#   urls:
#     - http://jarvis-api:8000/webhooks/livekit
#   api_key: ${LIVEKIT_API_KEY}
