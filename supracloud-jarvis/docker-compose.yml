# =============================================================================
# SupraCloud Jarvis — docker-compose.yml
# Phase 2: Core Infrastructure + FastAPI + LangGraph Multi-Agent System
#
# GPU Target : NVIDIA RTX A4500 (20GB VRAM)
# Fast Path  : Llama 3.1 8B AWQ  — gpu_memory_utilization=0.35 (~7GB)
# Deep Path  : Qwen 2.5 14B AWQ  — gpu_memory_utilization=0.60 (~12GB)
# Combined   : 0.95 × 20GB = 19GB — leaves 1GB for OS/driver overhead
#
# Network topology:
#   jarvis-external  → nginx, livekit (internet-facing)
#   jarvis-internal  → all services (isolated, no external routing)
#   jarvis-api       → both networks (proxied by nginx, calls internal services)
# =============================================================================

name: supracloud-jarvis

# ── Reusable fragments ────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-vllm-common: &vllm-common
  image: vllm/vllm-openai:latest
  restart: unless-stopped
  runtime: nvidia
  environment:
    NVIDIA_VISIBLE_DEVICES: "0"
    CUDA_VISIBLE_DEVICES: "0"
    # Spawn avoids CUDA fork issues with multiple workers
    VLLM_WORKER_MULTIPROC_METHOD: spawn
    # Marlin kernels are faster than standard AWQ on RTX/Ampere
    VLLM_USE_MARLIN: "1"
    HF_TOKEN: ${HF_TOKEN:-}
    # Disable telemetry
    DO_NOT_TRACK: "1"
  volumes:
    # Shared HF model cache — models download once, used by both instances
    - hf_cache:/root/.cache/huggingface
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  logging: *default-logging
  networks:
    - jarvis-internal

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 + pgvector ─────────────────────────────────────────────
  # Stores: conversation history, long-term memory, vector embeddings (RAG),
  #         security events, business events, registered agents.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-jarvis_db}
      # Tune for an AI workload: lots of reads, moderate writes
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c max_connections=100
        -c work_mem=16MB
        -c random_page_cost=1.1
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      # Bind to localhost only — never expose DB directly to the internet
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jarvis} -d ${POSTGRES_DB:-jarvis_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    networks:
      - jarvis-internal

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  # Stores: session cache, response cache, rate-limit counters,
  #         pub/sub for proactive agent events, task queues.
  redis:
    image: redis:7.4-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --save 300 100
        --appendonly yes
        --appendfsync everysec
        --tcp-backlog 511
        --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    networks:
      - jarvis-internal

  # ── vLLM Fast Path ────────────────────────────────────────────────────────
  # Model  : Llama 3.1 8B Instruct (AWQ-INT4, Marlin kernels)
  # Purpose: 90%+ of conversational queries, agent supervisor decisions
  # Target : <2s TTFT for simple queries, <5s end-to-end
  # VRAM   : ~7GB (gpu_memory_utilization=0.35 × 20GB)
  vllm-fast:
    <<: *vllm-common
    container_name: jarvis-vllm-fast
    volumes:
      - hf_cache:/root/.cache/huggingface
      - vllm_fast_cache:/tmp/vllm_fast
    command:
      - "--model"
      - "${FAST_MODEL:-hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4}"
      - "--served-model-name"
      - "llama-fast"
      - "--quantization"
      - "awq_marlin"
      - "--gpu-memory-utilization"
      - "0.35"
      - "--max-model-len"
      - "16384"            # 16k context — balances speed and KV cache usage
      - "--max-num-seqs"
      - "32"               # Handle 32 concurrent requests
      - "--max-num-batched-tokens"
      - "8192"
      - "--enable-prefix-caching" # Cache common system prompt prefixes
      - "--disable-log-requests"
      - "--port"
      - "8001"
      - "--host"
      - "0.0.0.0"
      - "--api-key"
      - "${VLLM_API_KEY:?Set VLLM_API_KEY in .env}"
      - "--dtype"
      - "auto"
      - "--tensor-parallel-size"
      - "1"
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s   # Model download + load time on first run

  # ── vLLM Deep Path ────────────────────────────────────────────────────────
  # Model  : Qwen 2.5 14B Instruct (AWQ-INT4, Marlin kernels)
  # Purpose: Complex reasoning, code generation, multi-step planning,
  #          Security Guardian analysis, Meta Agent Creator
  # Target : <8s end-to-end for complex tasks
  # VRAM   : ~12GB (gpu_memory_utilization=0.60 × 20GB)
  # Note   : Starts AFTER vllm-fast is healthy to avoid VRAM collision
  #          during simultaneous model loading
  vllm-deep:
    <<: *vllm-common
    container_name: jarvis-vllm-deep
    volumes:
      - hf_cache:/root/.cache/huggingface
      - vllm_deep_cache:/tmp/vllm_deep
    command:
      - "--model"
      - "${DEEP_MODEL:-Qwen/Qwen2.5-14B-Instruct-AWQ}"
      - "--served-model-name"
      - "qwen-deep"
      - "--quantization"
      - "awq_marlin"
      - "--gpu-memory-utilization"
      - "0.60"
      - "--max-model-len"
      - "32768"            # 32k context for deep reasoning and long docs
      - "--max-num-seqs"
      - "8"                # Fewer concurrent — deep tasks are heavyweight
      - "--max-num-batched-tokens"
      - "8192"
      - "--enable-prefix-caching"
      - "--disable-log-requests"
      - "--port"
      - "8002"
      - "--host"
      - "0.0.0.0"
      - "--api-key"
      - "${VLLM_API_KEY:?Set VLLM_API_KEY in .env}"
      - "--dtype"
      - "auto"
      - "--tensor-parallel-size"
      - "1"
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      vllm-fast:
        condition: service_healthy  # Wait for fast model to finish loading
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 240s   # Loads after fast model — allow extra time

  # ── LiveKit Server (Voice / WebRTC) ───────────────────────────────────────
  # Handles: Real-time audio streaming for voice interface
  # Works with: Faster-Whisper (STT) + Kokoro TTS (Phase 3)
  livekit:
    image: livekit/livekit-server:v1.7
    container_name: jarvis-livekit
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yaml
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
    environment:
      # Injected into livekit.yaml via env interpolation
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?Set LIVEKIT_API_KEY in .env}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?Set LIVEKIT_API_SECRET in .env}
    ports:
      - "7880:7880"       # HTTP/WebSocket (API + signalling)
      - "7881:7881"       # RTC over TCP (fallback for UDP-blocked networks)
      - "7882:7882/udp"   # RTC over UDP (primary, lowest latency)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging: *default-logging
    networks:
      - jarvis-internal
      - jarvis-external

  # ── Jarvis API (FastAPI + LangGraph) ─────────────────────────────────────
  # The intelligence layer — routes requests through the multi-agent graph.
  # Runs on CPU for API/orchestration; LLM inference is offloaded to vLLM.
  jarvis-api:
    build:
      context: ./jarvis
      dockerfile: Dockerfile
    container_name: jarvis-api
    restart: unless-stopped
    environment:
      # Database
      POSTGRES_USER: ${POSTGRES_USER:-jarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-jarvis_db}
      POSTGRES_HOST: postgres
      # Redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      # vLLM
      VLLM_API_KEY: ${VLLM_API_KEY}
      VLLM_FAST_URL: http://vllm-fast:8001/v1
      VLLM_DEEP_URL: http://vllm-deep:8002/v1
      # Auth
      JARVIS_SECRET_KEY: ${JARVIS_SECRET_KEY}
      JARVIS_ADMIN_USERNAME: ${JARVIS_ADMIN_USERNAME:-admin}
      JARVIS_ADMIN_PASSWORD: ${JARVIS_ADMIN_PASSWORD}
      JARVIS_DOMAIN: ${JARVIS_DOMAIN:-jarvis.local}
      # Embeddings (CPU)
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-large-en-v1.5}
      EMBEDDING_DEVICE: cpu
    volumes:
      # HF cache shared with vLLM — BGE model downloads here
      - hf_cache:/home/jarvis/.cache/huggingface
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vllm-fast:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging
    networks:
      - jarvis-internal
      - jarvis-external

  # ── Nginx (TLS Termination + Reverse Proxy) ───────────────────────────────
  # Routes: HTTPS → jarvis-api
  nginx:
    image: nginx:1.27-alpine
    container_name: jarvis-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - livekit
      - jarvis-api
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - jarvis-internal
      - jarvis-external

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  hf_cache:           # Shared HuggingFace model cache (models download once)
    driver: local
  vllm_fast_cache:
    driver: local
  vllm_deep_cache:
    driver: local
  nginx_logs:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  jarvis-internal:
    driver: bridge
    internal: true    # Strictly isolated — cannot reach internet directly
    ipam:
      config:
        - subnet: 172.20.0.0/24

  jarvis-external:
    driver: bridge    # Internet-facing (nginx, livekit only)
    ipam:
      config:
        - subnet: 172.21.0.0/24
