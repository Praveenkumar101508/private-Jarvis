# =============================================================================
# Nginx — SupraCloud Jarvis Reverse Proxy
# Phase 1: Status page + TLS skeleton ready for Phase 2 API proxy
#
# Security posture:
#   - TLS 1.2/1.3 only
#   - HSTS, CSP, X-Frame-Options, X-Content-Type-Options headers
#   - Rate limiting on all endpoints
#   - No server version disclosure
# =============================================================================

user nginx;
worker_processes auto;                  # One worker per CPU core
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ── Basics ────────────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Never reveal nginx version in responses or error pages
    server_tokens off;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Keep-alive tuning
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format json_access escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_access;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    # Global: 30 req/s per IP — prevents brute-force and DDoS
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    # API: stricter 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
    # Voice endpoint: 5 concurrent sessions per IP
    limit_conn_zone $binary_remote_addr zone=voice:10m;

    # ── Security Headers (applied globally) ───────────────────────────────────
    add_header X-Frame-Options           "DENY"                        always;
    add_header X-Content-Type-Options    "nosniff"                     always;
    add_header X-XSS-Protection          "1; mode=block"               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(self), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:; media-src 'self'; frame-ancestors 'none';"
        always;

    # ── TLS Settings ──────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    # OCSP stapling (enable when using a real CA cert)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Upstream Definitions (Phase 2: jarvis-api) ────────────────────────────
    # Uncomment in Phase 2 when jarvis-api container is running
    # upstream jarvis_api {
    #     server jarvis-api:8000;
    #     keepalive 32;
    # }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint for Docker healthcheck (no redirect)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS certificates
        # Phase 1: self-signed (generated by setup.sh)
        # Phase 2: replace with Let's Encrypt or your own CA
        ssl_certificate     /etc/nginx/certs/jarvis.crt;
        ssl_certificate_key /etc/nginx/certs/jarvis.key;

        # HSTS — browsers will only use HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Rate limiting on all routes ──────────────────────────────────────
        limit_req zone=global burst=60 nodelay;

        # ── Health check (no auth, no rate limit on health) ──────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"jarvis-nginx"}';
            add_header Content-Type application/json;
        }

        # ── Phase 1 Status Page ───────────────────────────────────────────────
        location / {
            limit_req zone=api burst=20 nodelay;
            return 200 '{"status":"initializing","message":"SupraCloud Jarvis Phase 1 — Infrastructure online. API coming in Phase 2.","version":"0.1.0"}';
            add_header Content-Type application/json;
        }

        # ── API Proxy (Phase 2) ───────────────────────────────────────────────
        # Uncomment this block in Phase 2:
        # location /api/ {
        #     limit_req zone=api burst=20 nodelay;
        #     proxy_pass http://jarvis_api;
        #     proxy_set_header Host              $host;
        #     proxy_set_header X-Real-IP         $remote_addr;
        #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_http_version 1.1;
        #     proxy_set_header Connection "";
        #     proxy_read_timeout  300s;
        #     proxy_send_timeout  300s;
        #     proxy_connect_timeout 10s;
        # }

        # ── WebSocket for real-time events (Phase 2) ──────────────────────────
        # location /ws/ {
        #     limit_conn voice 5;
        #     proxy_pass http://jarvis_api;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade    $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        #     proxy_set_header Host       $host;
        #     proxy_read_timeout 86400s;
        # }
    }
}
