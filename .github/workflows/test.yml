name: IRA Tests

on:
  push:
    branches: [main, master, "claude/*", supracloud_ira]
  pull_request:
    branches: [main, master, supracloud_ira]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('supracloud-jarvis/ira/requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install test dependencies
        working-directory: supracloud-jarvis/ira
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run unit tests (no Docker required)
        working-directory: supracloud-jarvis/ira
        env:
          DEV_MODE: "true"
          IRA_SECRET_KEY: "ci-test-secret-key"
          IRA_ADMIN_PASSWORD: "ci-test-password"
          POSTGRES_PASSWORD: "ci-test"
          REDIS_PASSWORD: "ci-test"
          VLLM_API_KEY: "ci-test"
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run auth/security tests WITHOUT DEV_MODE (exercise the real auth path)
        working-directory: supracloud-jarvis/ira
        # DEV_MODE=true bypasses auth globally and can mask auth-path regressions, so
        # these files run with DEV_MODE unset to exercise the real revocation/gate path.
        env:
          IRA_SECRET_KEY: "ci-test-secret-key"
          IRA_ADMIN_PASSWORD: "ci-test-password"
          POSTGRES_PASSWORD: "ci-test"
          REDIS_PASSWORD: "ci-test"
          VLLM_API_KEY: "ci-test"
        run: |
          python -m pytest -v --tb=short \
            tests/test_token_revocation.py \
            tests/test_phase5_guards.py

      - name: Check no auto-push (AST — catches the arg-vector form, not just "git push")
        working-directory: supracloud-jarvis/ira
        # The old literal grep could not see ["git", "push"]; this AST check can, and
        # its self-test runs in the suite above. See scripts/check_no_push.py.
        run: |
          python scripts/check_no_push.py

      - name: Check no hardcoded secrets
        run: |
          if grep -ri "CHANGE_ME\|changeme\|password123\|admin123" supracloud-jarvis/.env.example; then
            echo "⚠️  Weak placeholder detected in .env.example"
          fi
          if [ -f "supracloud-jarvis/.env" ]; then
            echo "❌ .env file is committed!"
            exit 1
          fi
          echo "✅ No committed secrets found"
