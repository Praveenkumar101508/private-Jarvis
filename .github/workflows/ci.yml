# Place at the TRUE git root: ./.github/workflows/ci.yml
# (top level, beside supracloud-jarvis/ — GitHub reads .github only at the repo root)
#
# Why two workflows?
#   - test.yml  → the FULL suite + security checks (the whole pytest tree, the
#                 no-DEV_MODE auth step, the AST no-push check, the secrets check).
#                 It installs requirements-test.txt (prod set + pytest extras).
#   - ci.yml    → THIS file. A narrow PROD-DEPENDENCY RESOLUTION GATE: it installs only
#                 requirements.txt (no test extras) to prove the production dependency
#                 set resolves on its own. test.yml can pass while a prod-only conflict
#                 hides behind the test extras, so this gate is kept separate on purpose.
name: CI
on: [push, pull_request]

jobs:
  prod-deps-resolve:
    name: Prod requirements resolution gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supracloud-jarvis/ira   # requirements.txt lives HERE
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install the full PROD set (resolution gate — no test extras)
        # If requirements.txt cannot resolve on its own this fails. The test suite runs
        # in test.yml; this job exists only to guard the prod dependency set in isolation.
        run: pip install -r requirements.txt
